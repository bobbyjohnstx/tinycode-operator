---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.instanceName }}-tinycode
  namespace: {{ .Values.instanceNamespace }}
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tinycode
      app.kubernetes.io/instance: {{ .Values.instanceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinycode
        app.kubernetes.io/instance: {{ .Values.instanceName }}
        app.kubernetes.io/managed-by: tinycode-operator
      annotations:
        {{- if .Values.auth.passwordSecret }}
        checksum/secret: {{ .Values.auth.passwordSecret | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.instanceName }}-tinycode
      # Let OpenShift assign the UID from the namespace's allowed range.
      # The container image (ghcr.io/bjohns/tiny-container) uses g=u
      # permissions so any assigned UID can write to its directories.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}

      containers:
        - name: tinycode
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          # entrypoint.sh starts tinycode in web mode (entrypoint.sh:35)
          # No command override — use the image's ENTRYPOINT

          ports:
            - name: http
              containerPort: 4096
              protocol: TCP

          env:
            {{- if .Values.auth.passwordSecret }}
            - name: TINYCODE_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.passwordSecret }}
                  key: TINYCODE_SERVER_PASSWORD
            {{- end }}
            {{- if .Values.ollama.host }}
            - name: TINYCODE_OLLAMA_HOST
              value: {{ .Values.ollama.host }}
            {{- end }}
            - name: TINYCODE_DISABLE_LSP_DOWNLOAD
              value: "1"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          volumeMounts:
            # XDG_DATA_HOME — tinycode SQLite DB, session history (entrypoint.sh:74-76)
            - name: data
              mountPath: /home/tinycode/.local/share/tinycode
              subPath: data
            # XDG_CONFIG_HOME — config.json, tinycode.jsonc (entrypoint.sh:74-76)
            - name: data
              mountPath: /home/tinycode/.config/tinycode
              subPath: config
            # /projects — user workspace files
            - name: projects
              mountPath: /projects

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        {{- if .Values.storage.hostPath.enabled }}
        - name: data
          emptyDir: {}
        - name: projects
          hostPath:
            path: {{ .Values.storage.hostPath.path }}
            type: DirectoryOrCreate
        {{- else }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-data
        - name: projects
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-projects
        {{- end }}

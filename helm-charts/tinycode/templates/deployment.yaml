---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.instanceName }}-tinycode
  namespace: {{ .Values.instanceNamespace }}
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tinycode
      app.kubernetes.io/instance: {{ .Values.instanceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinycode
        app.kubernetes.io/instance: {{ .Values.instanceName }}
        app.kubernetes.io/managed-by: tinycode-operator
      annotations:
        {{- if .Values.auth.passwordSecret }}
        checksum/secret: {{ .Values.auth.passwordSecret | sha256sum }}
        {{- end }}
        {{- if .Values.configContent }}
        checksum/config: {{ .Values.configContent | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.instanceName }}-tinycode
      # Let OpenShift assign the UID from the namespace's allowed range.
      # The container image (quay.io/bjohns/tinycode-container) uses g=u
      # permissions so any assigned UID can write to its directories.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}

      {{- if .Values.git.enabled }}
      initContainers:
        - name: git-clone
          image: {{ .Values.image | quote }}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ -d /projects/.git ]; then
                echo "Repository already exists at /projects"
                {{- if .Values.git.pullOnRestart }}
                echo "Pulling latest changes..."
                cd /projects
                git pull --depth {{ .Values.git.depth }}
                {{- else }}
                echo "Skipping pull (pullOnRestart=false)"
                {{- end }}
              else
                echo "Cloning repository..."
                git clone --depth {{ .Values.git.depth }} \
                  {{- if .Values.git.branch }}
                  --branch {{ .Values.git.branch | quote }} \
                  {{- end }}
                  {{ .Values.git.url | quote }} /projects
              fi
          volumeMounts:
            - name: projects
              mountPath: /projects
            {{- if .Values.git.credentialsSecret }}
            - name: git-credentials
              mountPath: /home/tinycode/.git-credentials
              subPath: credentials
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      {{- end }}

      containers:
        - name: tinycode
          image: {{ .Values.image | quote }}
          imagePullPolicy: Always
          # entrypoint.sh starts tinycode in web mode (entrypoint.sh:35)
          # No command override — use the image's ENTRYPOINT

          ports:
            - name: http
              containerPort: 4096
              protocol: TCP

          env:
            {{- if .Values.auth.passwordSecret }}
            - name: TINYCODE_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.passwordSecret }}
                  key: TINYCODE_SERVER_PASSWORD
            {{- end }}
            {{- if .Values.ollama.host }}
            - name: TINYCODE_OLLAMA_HOST
              value: {{ .Values.ollama.host | quote }}
            {{- end }}
            - name: TINYCODE_DISABLE_LSP_DOWNLOAD
              value: "1"
            {{- if .Values.clusterAdmin.enabled }}
            - name: KUBECONFIG
              value: /home/tinycode/.kube/config
            - name: TINYCODE_CLUSTER_ADMIN
              value: "true"
            - name: TINYCODE_OC_VERSION
              value: {{ .Values.clusterAdmin.ocVersion | quote }}
            {{- end }}
            {{- if or .Values.clusterAdmin.enabled .Values.configContent }}
            - name: TINYCODE_CONFIG_CONTENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.instanceName }}-tinycode-config
                  key: config.json
            {{- end }}
            {{- if .Values.discovery.namespaces }}
            - name: TINYCODE_DISCOVERY_NAMESPACES
              value: {{ join "," .Values.discovery.namespaces | quote }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          volumeMounts:
            # XDG_DATA_HOME — tinycode SQLite DB, session history (entrypoint.sh:74-76)
            - name: data
              mountPath: /home/tinycode/.local/share/tinycode
              subPath: data
            # XDG_CONFIG_HOME — config.json, tinycode.jsonc (entrypoint.sh:74-76)
            - name: data
              mountPath: /home/tinycode/.config/tinycode
              subPath: config
            # /projects — user workspace files
            - name: projects
              mountPath: /projects
            {{- if .Values.clusterAdmin.enabled }}
            - name: kubeconfig-vol
              mountPath: /home/tinycode/.kube/config
              subPath: {{ .Values.clusterAdmin.kubeconfigSecretKey }}
              readOnly: true
            {{- end }}

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ if .Values.clusterAdmin.enabled }}90{{ else }}15{{ end }}
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ if .Values.clusterAdmin.enabled }}60{{ else }}5{{ end }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        {{- if .Values.storage.hostPath.enabled }}
        - name: data
          emptyDir: {}
        - name: projects
          hostPath:
            path: {{ .Values.storage.hostPath.path | quote }}
            type: DirectoryOrCreate
        {{- else }}
        # Use emptyDir for data volume when replicas > 1 (SQLite can't be shared)
        {{- if gt (int .Values.replicas) 1 }}
        - name: data
          emptyDir: {}
        {{- else }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-data
        {{- end }}
        - name: projects
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-projects
        {{- end }}
        {{- if .Values.clusterAdmin.enabled }}
        - name: kubeconfig-vol
          secret:
            secretName: {{ .Values.clusterAdmin.kubeconfigSecretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.git.enabled }}
        {{- if .Values.git.credentialsSecret }}
        - name: git-credentials
          secret:
            secretName: {{ .Values.git.credentialsSecret }}
            defaultMode: 0400
        {{- end }}
        {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.instanceName }}-tinycode
  namespace: {{ .Values.instanceNamespace }}
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tinycode
      app.kubernetes.io/instance: {{ .Values.instanceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinycode
        app.kubernetes.io/instance: {{ .Values.instanceName }}
        app.kubernetes.io/managed-by: tinycode-operator
      annotations:
        # Force re-rollout when the password secret changes
        {{- if .Values.auth.passwordSecret }}
        checksum/secret: {{ .Values.auth.passwordSecret | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.instanceName }}-tinycode
      # OpenShift requires explicit runAsNonRoot. UID 1000 matches the
      # tinycode container image's non-root user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}

      containers:
        - name: tinycode
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - dev
            - serve
            - --hostname
            - "0.0.0.0"

          ports:
            - name: http
              containerPort: 4096
              protocol: TCP

          env:
            - name: TINYCODE_DATA_DIR
              value: /data
            {{- if .Values.auth.passwordSecret }}
            - name: TINYCODE_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.passwordSecret }}
                  key: TINYCODE_SERVER_PASSWORD
            {{- end }}
            {{- if .Values.ollama.host }}
            - name: TINYCODE_OLLAMA_HOST
              value: {{ .Values.ollama.host }}
            {{- end }}
            - name: TINYCODE_DISABLE_LSP_DOWNLOAD
              value: "1"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            {{- if .Values.shell.enabled }}
            # Shell access requires additional capabilities. Only enabled when
            # spec.shell.enabled=true AND the tinycode-shell SCC is bound.
            readOnlyRootFilesystem: false
            {{- else }}
            readOnlyRootFilesystem: false
            {{- end }}

          volumeMounts:
            - name: data
              mountPath: /data
            - name: projects
              mountPath: /projects
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        {{- if .Values.storage.hostPath.enabled }}
        - name: data
          emptyDir: {}
        - name: projects
          hostPath:
            path: {{ .Values.storage.hostPath.path }}
            type: DirectoryOrCreate
        {{- else }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-data
        - name: projects
          persistentVolumeClaim:
            claimName: {{ .Values.instanceName }}-projects
        {{- end }}
        - name: tmp
          emptyDir: {}

{{- if .Values.discovery.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.instanceName }}-{{ .Values.instanceNamespace }}-tinycode-cross-namespace-discovery
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.instanceName }}-tinycode-cross-namespace-discovery
subjects:
  - kind: ServiceAccount
    name: {{ .Values.instanceName }}-tinycode
    namespace: {{ .Values.instanceNamespace }}
{{- end }}

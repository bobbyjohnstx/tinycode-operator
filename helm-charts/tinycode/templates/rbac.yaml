---
# Grants the tinycode instance pod permission to list Services in its namespace.
# Required for Kubernetes-native vLLM auto-discovery (local-discovery.ts).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.instanceName }}-tinycode-discovery
  namespace: {{ .Values.instanceNamespace }}
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.instanceName }}-tinycode-discovery
  namespace: {{ .Values.instanceNamespace }}
  labels:
    app.kubernetes.io/name: tinycode
    app.kubernetes.io/instance: {{ .Values.instanceName }}
    app.kubernetes.io/managed-by: tinycode-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.instanceName }}-tinycode-discovery
subjects:
  - kind: ServiceAccount
    name: {{ .Values.instanceName }}-tinycode
    namespace: {{ .Values.instanceNamespace }}

image: quay.io/bjohns/tinycode-container:latest
replicas: 1

resources:
  limits:
    cpu: "2"
    memory: "2Gi"
  requests:
    cpu: "200m"
    memory: "512Mi"

storage:
  dataSize: "1Gi"
  projectsSize: "10Gi"
  projectsAccessMode: "ReadWriteOnce"
  storageClassName: ""
  hostPath:
    enabled: false
    path: ""
    readOnly: false

hostname: ""
tlsTermination: edge

ollama:
  enabled: false
  host: ""
  models: []

auth:
  passwordSecret: ""

shell:
  enabled: false

clusterAdmin:
  enabled: false
  kubeconfigSecretName: ""
  kubeconfigSecretKey: "kubeconfig"
  ocVersion: "stable"
  kubeconfigNamespace: ""
  clusterRole: ""

git:
  enabled: false
  url: ""
  branch: ""
  credentialsSecret: ""
  pullOnRestart: false
  depth: 1

nodeSelector: {}
tolerations: []

# vLLM provider config — set by the operator from spec.vllm
configContent: ""

# Discovery config — set by the operator from spec.discovery
discovery:
  namespaces: []

# Internal — set by the operator from CR metadata
instanceName: ""
instanceNamespace: ""

---
# Grants the operator manager the ability to bind tinycode SCCs to instance
# ServiceAccounts. This is a ClusterRole because SCCs are cluster-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinycode-operator-scc-role
  labels:
    app.kubernetes.io/name: tinycode-operator
    app.kubernetes.io/managed-by: tinycode-operator
rules:
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    resourceNames:
      - tinycode-restricted
      - tinycode-hostpath
      - tinycode-shell
    verbs:
      - use
      - get
      - list
      - watch
      - patch
      - update

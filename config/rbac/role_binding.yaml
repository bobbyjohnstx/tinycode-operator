---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinycode-operator-manager-rolebinding
  labels:
    app.kubernetes.io/name: tinycode-operator
    app.kubernetes.io/managed-by: tinycode-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tinycode-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: tinycode-operator-manager
    namespace: tinycode-operator-system
---
# SCC binding — allows the operator's SA to use and grant tinycode SCCs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinycode-operator-scc-binding
  labels:
    app.kubernetes.io/name: tinycode-operator
    app.kubernetes.io/managed-by: tinycode-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tinycode-operator-scc-role
subjects:
  - kind: ServiceAccount
    name: tinycode-operator-manager
    namespace: tinycode-operator-system

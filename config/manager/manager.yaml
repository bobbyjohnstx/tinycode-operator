---
apiVersion: v1
kind: Namespace
metadata:
  name: tinycode-operator-system
  labels:
    app.kubernetes.io/name: tinycode-operator
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinycode-operator-manager
  namespace: tinycode-operator-system
  labels:
    app.kubernetes.io/name: tinycode-operator
    app.kubernetes.io/component: manager
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: tinycode-operator
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: tinycode-operator-manager
      # Operator runs fully restricted — no host access, dropped ALL caps
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: manager
          image: quay.io/tinycode/operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
            - --leader-election-id=tinycode-operator
          ports:
            - name: metrics
              containerPort: 8383
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: WATCH_NAMESPACE
              value: ""  # Empty = cluster-wide watch
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HELM_CHART_PATH
              value: /helm-charts/tinycode
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tinycodeinstances.tinycode.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: tinycode.dev
  names:
    kind: TinycodeInstance
    listKind: TinycodeInstanceList
    plural: tinycodeinstances
    singular: tinycodeinstance
    shortNames:
      - tinycode
      - tc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: TinycodeInstance is the Schema for a tinycode AI coding assistant deployment.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: TinycodeInstanceSpec defines the desired state of a TinycodeInstance.
              type: object
              properties:
                image:
                  description: Container image for tinycode. Defaults to quay.io/bjohns/tinycode-container:latest.
                  type: string
                  default: "quay.io/bjohns/tinycode-container:latest"
                replicas:
                  description: Number of tinycode server replicas. Defaults to 1.
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 1
                resources:
                  description: Resource requirements for the tinycode container.
                  type: object
                  properties:
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "2"
                        memory:
                          type: string
                          default: "2Gi"
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "200m"
                        memory:
                          type: string
                          default: "512Mi"
                storage:
                  description: Storage configuration for tinycode data and project files.
                  type: object
                  properties:
                    dataSize:
                      description: Size of the PVC for tinycode database and config. Default 1Gi.
                      type: string
                      default: "1Gi"
                    projectsSize:
                      description: Size of the PVC for project workspace files. Default 10Gi.
                      type: string
                      default: "10Gi"
                    projectsAccessMode:
                      description: |
                        Access mode for projects PVC. ReadWriteOnce (default) or ReadWriteMany.
                        Use ReadWriteMany for shared team workspaces with replicas > 1.
                      type: string
                      enum:
                        - ReadWriteOnce
                        - ReadWriteMany
                      default: ReadWriteOnce
                    storageClassName:
                      description: StorageClass to use for PVCs. Defaults to cluster default.
                      type: string
                    hostPath:
                      description: |
                        Optional. Mount a directory from the host node into the tinycode container
                        as /projects. Requires the tinycode-hostpath SCC and cluster-admin approval.
                        Use this only when direct host filesystem access is required.
                      type: object
                      required:
                        - path
                      properties:
                        path:
                          description: Absolute path on the host node to mount.
                          type: string
                          pattern: "^/.*"
                        readOnly:
                          description: Mount the host path as read-only. Default false.
                          type: boolean
                          default: false
                hostname:
                  description: Custom hostname for the tinycode Route. Auto-generated if omitted.
                  type: string
                tlsTermination:
                  description: TLS termination mode for the Route. edge (default), passthrough, or reencrypt.
                  type: string
                  enum:
                    - edge
                    - passthrough
                    - reencrypt
                  default: edge
                ollama:
                  description: Configuration for the Ollama LLM backend.
                  type: object
                  properties:
                    enabled:
                      description: Deploy an Ollama sidecar/service. Default false.
                      type: boolean
                      default: false
                    host:
                      description: External Ollama host URL. Used when enabled is false.
                      type: string
                    models:
                      description: List of Ollama model names to pre-pull on startup.
                      type: array
                      items:
                        type: string
                auth:
                  description: Authentication configuration.
                  type: object
                  properties:
                    passwordSecret:
                      description: |
                        Name of a Secret in the same namespace containing the key
                        TINYCODE_SERVER_PASSWORD. If not set, the server starts unauthenticated
                        (not recommended for production).
                      type: string
                nodeSelector:
                  description: Node selector constraints for the tinycode pod.
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  description: Tolerations for the tinycode pod.
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      operator:
                        type: string
                      value:
                        type: string
                      effect:
                        type: string
                      tolerationSeconds:
                        type: integer
                        format: int64
                shell:
                  description: Shell access configuration for the tinycode container.
                  type: object
                  properties:
                    enabled:
                      description: |
                        Enable host-level shell access. When true, the pod uses the
                        tinycode-shell SCC which grants hostPID and limited host capabilities.
                        Requires cluster-admin to pre-approve the SCC binding.
                      type: boolean
                      default: false
                    allowedCommands:
                      description: Restrict which shell commands may be executed (future enforcement via admission webhook).
                      type: array
                      items:
                        type: string
                clusterAdmin:
                  description: |
                    OpenShift/Kubernetes cluster management configuration. When enabled, mounts a
                    kubeconfig Secret and downloads the oc CLI at startup so the cluster-admin agent
                    can interact with the cluster. v2 will add serviceAccount mode (reserved field).
                  type: object
                  properties:
                    enabled:
                      description: Enable cluster management mode. Downloads the oc CLI and mounts the kubeconfig.
                      type: boolean
                      default: false
                    kubeconfigSecretName:
                      description: Name of a Secret in the same namespace containing a kubeconfig file. Required when enabled is true.
                      type: string
                    kubeconfigSecretKey:
                      description: Key within the Secret containing the kubeconfig. Defaults to "kubeconfig".
                      type: string
                      default: "kubeconfig"
                    ocVersion:
                      description: oc CLI version to download. Defaults to "stable". Use a specific version like "4.17" for reproducibility.
                      type: string
                      default: "stable"
                    kubeconfigNamespace:
                      description: |
                        Optional namespace where the kubeconfig Secret lives (for cross-namespace Secret mounting).
                        If set and differs from instance namespace, the Secret will be copied to the instance namespace.
                      type: string
                    clusterRole:
                      description: |
                        Auto-provision a ServiceAccount with this ClusterRole instead of requiring a pre-created kubeconfig.
                        Cannot be 'admin' or 'cluster-admin' (privilege escalation guard).
                      type: string
                      pattern: "^(?!admin$|cluster-admin$).*$"
                vllm:
                  description: |
                    Array of vLLM endpoints to configure as tinycode providers. Each entry must
                    have a name and URL. The operator auto-probes models and context limits unless
                    you override them in the models field.
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - name
                      - url
                    properties:
                      name:
                        description: Provider name for this vLLM instance. Must be unique within the array.
                        type: string
                        pattern: "^[a-z0-9][a-z0-9-]*$"
                        minLength: 1
                        maxLength: 63
                      url:
                        description: Base URL of the vLLM instance (e.g., http://vllm-qwen.vllm:8000).
                        type: string
                        pattern: "^https?://"
                      models:
                        description: |
                          Optional per-model overrides. Keys are model IDs, values contain
                          contextLimit and/or outputLimit. Unspecified models are auto-probed.
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            contextLimit:
                              description: Override the auto-detected context limit for this model.
                              type: integer
                              minimum: 1024
                            outputLimit:
                              description: Override the auto-detected output limit for this model.
                              type: integer
                              minimum: 256
                model:
                  description: |
                    Default model ID for the tinycode instance. Used as the model parameter in the
                    generated config. Example: "qwen/Qwen2.5-Coder-32B-Instruct-AWQ".
                  type: string
                discovery:
                  description: Cross-namespace vLLM discovery configuration.
                  type: object
                  properties:
                    namespaces:
                      description: |
                        List of namespaces to search for vLLM services. Each entry may be a namespace
                        name or "*" for all namespaces. The operator creates a ClusterRole with service
                        get/list permissions and binds it to the tinycode instance.
                      type: array
                      maxItems: 50
                      items:
                        type: string
                        minLength: 1
                        maxLength: 63
                git:
                  description: |
                    GitOps mode — clone a repository into /projects instead of using PVC storage.
                    Mutually exclusive with storage.hostPath.
                  type: object
                  required:
                    - url
                  properties:
                    url:
                      description: Git repository URL (https, ssh, or git protocol).
                      type: string
                      pattern: "^(https?|ssh|git)://.*"
                    branch:
                      description: Branch to clone. Defaults to the repository's default branch.
                      type: string
                    credentialsSecret:
                      description: |
                        Name of a Secret in the same namespace containing git credentials.
                        Expected keys: username, password (for HTTPS) or ssh-privatekey (for SSH).
                      type: string
                    pullOnRestart:
                      description: Pull latest changes from the repository on pod restart. Default false.
                      type: boolean
                      default: false
                    depth:
                      description: Clone depth (--depth). Default 1 (shallow clone).
                      type: integer
                      minimum: 1
                      default: 1
            status:
              description: TinycodeInstanceStatus defines the observed state.
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                url:
                  description: External URL of the tinycode instance.
                  type: string
                phase:
                  description: Current phase of the instance lifecycle.
                  type: string
                  enum:
                    - Pending
                    - Deploying
                    - Running
                    - Failed
                    - Terminating
                observedGeneration:
                  type: integer
                  format: int64
